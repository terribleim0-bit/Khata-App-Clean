<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Amount - Khata App</title>
    

    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="../assets/js/theme.js"></script>

    <script>
        document.addEventListener('deviceready', function() {
            document.addEventListener('backbutton', function (e) {
                e.preventDefault();
                history.back(); 
            }, false);

            document.addEventListener('resume', function() {
                const isLockEnabled = localStorage.getItem('app_lock_enabled') === 'true';
                if (isLockEnabled) {
                    sessionStorage.removeItem('unlocked');
                    window.location.replace('lock.html');
                }
            }, false);
        }, false);
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        
        :root {
            --key-num-bg: #f2f8f8;
            --key-num-text: #111827;
            --key-op-bg: #e7f4ea;
            --key-op-text: #166534;
            --key-eq-bg: #c2e4c9;
            --key-eq-text: #14532d;
            --key-bs-bg: #ffebed;
            --key-bs-text: #ef4444;
            --cursor-color: #111827;
        }
        
        .dark {
            --key-num-bg: #1c1c1e;
            --key-num-text: #f3f4f6;
            --key-op-bg: #143120;
            --key-op-text: #4ade80; 
            --key-eq-bg: #166534;
            --key-eq-text: #86efac;
            --key-bs-bg: #451a1a;
            --key-bs-text: #f87171;
            --cursor-color: #ffffff;
        }

        body { -webkit-tap-highlight-color: transparent; }
        
        .key-btn { 
            border-radius: 12px; font-size: 24px; font-weight: 600; 
            display: flex; align-items: center; justify-content: center; 
            height: 58px; transition: all 0.1s ease; 
        }
        .key-btn:active { transform: scale(0.92); opacity: 0.8; }
        
        .key-num { background-color: var(--key-num-bg); color: var(--key-num-text); }
        .key-op { background-color: var(--key-op-bg); color: var(--key-op-text); }
        .key-eq { background-color: var(--key-eq-bg); color: var(--key-eq-text); }
        .key-backspace { background-color: var(--key-bs-bg); color: var(--key-bs-text); }
        
        .cursor { 
            display: inline-block; width: 2px; height: 44px; 
            background-color: var(--cursor-color); 
            animation: blink 1s step-end infinite; 
            vertical-align: middle; margin-left: 5px; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
<link rel="stylesheet" href="./assets/css/theme.css">
</head>
<body class="font-sans h-[100dvh] flex flex-col relative overflow-hidden bg-[#f4f7f6] dark:bg-[#0a0a0a] transition-colors duration-200">

    <header class="bg-white dark:bg-[#121212] px-4 py-3 flex items-center gap-4 border-b border-gray-200 dark:border-[#2a2a2e] shrink-0 z-10 transition-colors">
        <button onclick="history.back()" class="text-gray-900 dark:text-gray-100 active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
        </button>
        <div class="flex flex-col flex-1 min-w-0">
            <h1 id="header-name" class="text-base font-bold text-gray-900 dark:text-gray-100 truncate">Edit Amount</h1>
            <p id="header-date" class="text-xs font-semibold tracking-wide text-gray-500 dark:text-gray-400 truncate">Loading...</p>
        </div>
        <div id="entry-type-badge" class="ml-auto text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border shrink-0 bg-blue-50 border-blue-200 text-blue-600 dark:bg-blue-900/20 dark:border-blue-800 dark:text-blue-400">EDIT</div>
    </header>

    <main class="flex-1 overflow-y-auto px-5 py-6 flex flex-col items-center justify-center">
        <p id="error-msg" class="text-red-500 text-[12px] font-bold mb-4 hidden uppercase tracking-wider h-4"></p>

        <div class="w-full text-center mb-6">
            <div id="amount-container" class="text-5xl font-bold flex justify-center items-center transition-colors text-blue-600 dark:text-blue-500">
                <span>₹</span>
                <span id="amount-display">0</span>
                <span class="cursor"></span>
            </div>
            <div id="amount-underline" class="h-[3px] w-32 mx-auto mt-4 rounded-full opacity-40 transition-colors bg-blue-600 dark:bg-blue-500"></div>
        </div>
    </main>

    <div id="action-container" class="hidden px-3 mb-4 flex flex-col gap-3 shrink-0 transition-all duration-300">
        <button id="save-btn" class="w-full text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 text-[16px] tracking-wide transition-transform active:scale-95 bg-blue-600 shadow-blue-600/30">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
            Save Changes
        </button>
    </div>

    <div class="grid grid-cols-4 gap-2 px-3 pb-safe bg-white dark:bg-[#121212] pt-3 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_15px_rgba(0,0,0,0.2)] z-10">
        <button onclick="pressKey('7')" class="key-btn key-num">7</button>
        <button onclick="pressKey('8')" class="key-btn key-num">8</button>
        <button onclick="pressKey('9')" class="key-btn key-num">9</button>
        <button onclick="pressKey('back')" class="key-btn key-backspace">⌫</button>
        
        <button onclick="pressKey('4')" class="key-btn key-num">4</button>
        <button onclick="pressKey('5')" class="key-btn key-num">5</button>
        <button onclick="pressKey('6')" class="key-btn key-num">6</button>
        <button onclick="pressKey('*')" class="key-btn key-op">×</button>
        
        <button onclick="pressKey('1')" class="key-btn key-num">1</button>
        <button onclick="pressKey('2')" class="key-btn key-num">2</button>
        <button onclick="pressKey('3')" class="key-btn key-num">3</button>
        <button onclick="pressKey('-')" class="key-btn key-op">−</button>
        
        <button onclick="pressKey('.')" class="key-btn key-num">.</button>
        <button onclick="pressKey('0')" class="key-btn key-num">0</button>
        <button onclick="pressKey('=')" class="key-btn key-eq">=</button>
        <button onclick="pressKey('+')" class="key-btn key-op">+</button>
    </div>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/edit_confirm.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
