<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delete Transaction Warning</title>
    
    

    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="../assets/js/theme.js"></script>

    <script>
        document.addEventListener('deviceready', function() {
            document.addEventListener('backbutton', function (e) {
                e.preventDefault();
                history.back(); 
            }, false);

            document.addEventListener('resume', function() {
                const isLockEnabled = localStorage.getItem('app_lock_enabled') === 'true';
                if (isLockEnabled) {
                    sessionStorage.removeItem('unlocked');
                    window.location.replace('lock.html');
                }
            }, false);
        }, false);
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>

<link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body class="bg-[#f7f9fa] dark:bg-[#0a0a0a] text-[#1c1c1e] dark:text-gray-100 flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300">

    <header class="flex-none p-4 flex items-center border-b border-gray-200 dark:border-[#2a2a2e] bg-white dark:bg-[#121212] transition-colors">
        <button onclick="history.back()" class="text-gray-600 dark:text-gray-400 active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </button>
        <h1 class="ml-4 text-xl font-bold">Delete Entry</h1>
    </header>

    <main class="flex-1 overflow-y-auto px-5 pt-12 pb-32 flex flex-col items-center">
        
        <div id="status-icon" class="mb-4 flex items-center justify-center"></div>

        <h2 class="font-bold text-2xl mb-6 text-[#1c1c1e] dark:text-gray-100 tracking-tight">Delete this entry?</h2>
        
        <div class="w-full bg-white dark:bg-[#1c1c1e] rounded-2xl p-5 border border-gray-100 dark:border-[#2a2a2e] shadow-sm mb-6 transition-colors">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-[15px] font-bold text-gray-500 dark:text-gray-400">Entry Amount</h3>
                    <p id="txn-date" class="text-[13px] text-gray-400 dark:text-gray-500 mt-1">Loading date...</p>
                </div>
                <div class="text-right">
                    <p id="txn-amount" class="text-2xl font-bold text-[#1c1c1e] dark:text-gray-100 leading-tight">₹0</p>
                </div>
            </div>
            
            <div id="txn-note-container" class="mt-4 pt-4 border-t border-gray-100 dark:border-[#2a2a2e] hidden">
                <div class="flex items-start">
                    <svg class="w-4 h-4 text-gray-400 mt-0.5 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                    <p id="txn-note" class="text-[14px] text-gray-600 dark:text-gray-300 font-medium break-words">Note text</p>
                </div>
            </div>
        </div>

        <p class="text-[14px] text-gray-500 dark:text-gray-400 leading-relaxed font-medium text-center px-2">
            Eh entry delete ho jayegi aur customer da balance update ho jayega. Tusi isnu baad vich sirf dekh sakoge, edit nahi.
        </p>

    </main>

    <footer class="fixed bottom-0 w-full px-5 py-6 pb-safe z-40 flex flex-col gap-3">
        <button id="confirm-del-btn" class="w-full bg-transparent border-2 border-[#ef4444] text-[#ef4444] font-bold text-[16px] py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center">
            Yes, Delete Entry
        </button>
        <button onclick="history.back()" class="w-full bg-gray-100 dark:bg-[#1c1c1e] text-gray-600 dark:text-gray-300 font-bold text-[16px] py-4 rounded-xl active:scale-95 transition-all border border-transparent dark:border-[#2a2a2e]">
            Cancel
        </button>
    </footer>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/delete_warning.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
