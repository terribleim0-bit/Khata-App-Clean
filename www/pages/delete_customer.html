<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delete Customer - Khata App</title>
    

    <script>
        tailwind.config = { darkMode: 'class' };
    </script>

    <script src="../assets/js/theme.js"></script>

    <script>
        document.addEventListener('deviceready', function() {
            // Hardware Back Button fixed
            document.addEventListener('backbutton', function (e) {
                e.preventDefault();
                history.back(); 
            }, false);

            // Resume/Lock Check
            document.addEventListener('resume', function() {
                const isLockEnabled = localStorage.getItem('app_lock_enabled') === 'true';
                if (isLockEnabled) {
                    sessionStorage.removeItem('unlocked');
                    window.location.replace('lock.html');
                }
            }, false);
        }, false);
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
<link rel="stylesheet" href="./assets/css/theme.css">
</head>
<body class="bg-[#f4f6f8] dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300">

    <header class="flex-none p-4 flex items-center border-b border-gray-200 dark:border-[#2a2a2e] bg-white dark:bg-[#121212] transition-colors shadow-sm">
        <button onclick="history.back()" class="text-gray-600 dark:text-gray-400 active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </button>
        <h1 class="ml-4 text-xl font-bold">Delete Customer</h1>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-8 pb-32 flex flex-col items-center">
        
        <div class="w-full max-w-md bg-white dark:bg-[#1c1c1e] rounded-2xl p-6 border border-gray-200 dark:border-[#2a2a2e] shadow-sm mb-10 flex items-center justify-between transition-colors">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gray-100 dark:bg-[#121212] rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-[#2a2a2e]">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <div>
                    <h2 id="cust-name" class="font-bold text-lg text-gray-900 dark:text-gray-100">Loading...</h2>
                    <p id="cust-bal-text" class="text-[11px] font-bold tracking-widest uppercase mt-0.5 text-gray-400">₹0 Balance</p>
                </div>
            </div>
            <div id="cust-bal-amt" class="text-2xl font-bold tracking-tight">₹0</div>
        </div>

        <div id="msg-container" class="text-center max-w-sm transition-all duration-300">
            <div id="status-icon" class="mb-6 flex justify-center"></div>
            <h3 id="status-title" class="text-xl font-bold mb-2 text-gray-900 dark:text-gray-100">Paji, checking balance...</h3>
            <p id="status-desc" class="text-[14px] text-gray-500 dark:text-gray-400 leading-relaxed font-medium px-4"></p>
        </div>

    </main>

    <footer>
        <div class="max-w-md mx-auto">
            <button id="action-btn" class="w-full text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 text-[16px] tracking-wide transition-transform active:scale-95">
                Loading...
            </button>
        </div>
    </footer>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/delete_customer.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
