<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Entry Details - Khata App</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: cdvfile: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';">

    <script src="../cordova.js"></script>
    
    <link rel="stylesheet" href="../assets/css/theme.css">
    <script defer src="../assets/js/theme.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>

<body class="bg-master text-primary flex flex-col h-[100dvh] overflow-hidden font-sans transition-colors duration-300 pb-[84px] antialiased">

    <header class="relative bg-master/80 backdrop-blur-xl border-b border-line shrink-0 z-40 h-[60px] flex items-center justify-between px-4 transition-colors">
        <button onclick="history.back()" class="p-2 -ml-2 text-brand active:opacity-50 transition-opacity z-10 shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="flex-1 flex justify-center items-center overflow-hidden px-2">
            <h1 id="header-name" class="text-[17px] font-semibold leading-tight text-primary truncate">Loading...</h1>
        </div>
        <div class="w-10 shrink-0"></div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col items-center">
        
        <div class="w-full max-w-md bg-card rounded-3xl py-8 px-6 border border-line shadow-sm flex flex-col items-center justify-center mb-4 transition-colors">
            <span id="detail-type-badge" class="text-[10px] font-bold uppercase tracking-[2px] px-3 py-1 rounded-full mb-3 border hidden">ENTRY</span>
            
            <div class="flex items-center justify-center">
                <span class="text-3xl font-light text-muted">₹</span>
                <span id="detail-amount" class="text-5xl font-bold tracking-tight ml-1">0</span>
                
                <a id="top-edit-link" href="#" class="ml-4 p-2 bg-master rounded-full text-secondary border border-line active:scale-90 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </a>
            </div>
        </div>

        <div class="w-full max-w-md bg-card rounded-3xl p-4 border border-line shadow-sm mb-4 transition-colors flex flex-col">
            <span id="bill-counter" class="hidden">0/5</span>
            
            <div class="flex items-center space-x-3 overflow-x-auto w-full shrink-0 snap-x" id="bills-scroll-row">
                
                <div id="add-bill-trigger" class="shrink-0 w-[65px] h-[65px] rounded-[16px] border border-line bg-master flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-all snap-start">
                    <svg class="w-[22px] h-[22px] text-brand mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="text-[10px] font-bold text-brand uppercase tracking-tight mt-0.5">Add Bill</span>
                </div>

                <div id="bills-thumb-container" class="flex items-center space-x-3"></div>
            </div>
        </div>

        <div class="w-full max-w-md bg-card rounded-3xl border border-line shadow-sm overflow-hidden transition-colors flex flex-col mb-8">
            
            <div id="note-edit-link" onclick="openNoteModal()" class="flex items-stretch min-h-[56px] active:bg-black/5 dark:active:bg-white/5 transition-colors cursor-pointer">
                <div class="w-14 flex items-center justify-center shrink-0 text-brand">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </div>
                <div class="flex-1 flex items-center border-b border-line mr-4">
                    <p id="detail-note" class="text-[15px] font-medium text-muted truncate">Tap to add a note...</p>
                </div>
            </div>

            <div class="flex items-stretch min-h-[56px]">
                <div class="w-14 flex items-center justify-center shrink-0 text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div class="flex-1 flex items-center border-b border-line mr-4">
                    <p class="text-[15px] text-muted">Added On <span id="detail-date">Loading...</span></p>
                </div>
            </div>

            <div id="edited-container" class="flex items-stretch min-h-[56px] hidden">
                <div class="w-14 flex items-center justify-center shrink-0 text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div class="flex-1 flex items-center border-b border-line mr-4">
                    <p class="text-[15px] text-muted">Edited On <span id="detail-edited-date">Loading...</span></p>
                </div>
            </div>

            <div id="deleted-container" class="flex items-stretch min-h-[56px] hidden">
                <div class="w-14 flex items-center justify-center shrink-0 text-primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                </div>
                <div class="flex-1 flex items-center border-b border-line mr-4">
                    <p class="text-[15px] text-muted">Deleted On <span id="detail-deleted-date">Loading...</span></p>
                </div>
            </div>

            <a id="list-edit-btn" href="#" class="flex items-stretch min-h-[56px] active:bg-black/5 dark:active:bg-white/5 transition-colors cursor-pointer">
                <div class="w-14 flex items-center justify-center shrink-0 text-brand">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </div>
                <div class="flex-1 flex items-center border-b border-line mr-4">
                    <p class="text-[15px] font-medium text-brand">Edit Transaction</p>
                </div>
            </a>

            <a id="list-delete-btn" href="#" class="flex items-stretch min-h-[56px] active:bg-status-red/10 transition-colors cursor-pointer">
                <div class="w-14 flex items-center justify-center shrink-0 text-status-red">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </div>
                <div class="flex-1 flex items-center mr-4">
                    <p id="delete-text" class="text-[15px] font-medium text-status-red">Delete Entry</p>
                </div>
            </a>
        </div>
    </main>

    <div id="billModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity modal-overlay"></div>
        <div class="modal-content relative w-full max-w-md bg-card rounded-t-[28px] p-6 pb-10 transform translate-y-full transition-transform duration-300 shadow-2xl">
            <div class="w-12 h-1.5 bg-line rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-bold text-primary mb-4 text-center">Attach Bill</h3>
            <div class="flex flex-col gap-3 mb-2">
                <button id="cam-capture-btn" class="w-full py-4 bg-master text-primary font-bold rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-transform border border-line">
                    <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Take Photo
                </button>
                <button id="cam-gallery-btn" class="w-full py-4 bg-master text-primary font-bold rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-transform border border-line">
                    <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Choose from Gallery
                </button>
                <input type="file" id="native-gallery-input" multiple accept="image/*" class="hidden">
            </div>
        </div>
    </div>

    <div id="noteModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity modal-overlay"></div>
        <div class="modal-content relative w-full max-w-md bg-card rounded-t-[28px] p-6 pb-10 transform translate-y-full transition-transform duration-300 shadow-2xl">
            <div class="w-12 h-1.5 bg-line rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-bold text-primary mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Edit Note
                <span class="text-[11px] font-medium text-secondary ml-auto">Max 150 chars</span>
            </h3>
            <div class="bg-master p-2 rounded-xl border border-line mb-6">
                <input type="text" id="quick-note-input" maxlength="150" placeholder="Add a note..." class="w-full bg-transparent text-[16px] text-primary outline-none font-medium p-2 placeholder-muted">
            </div>
            <button onclick="saveNote()" id="save-note-btn" class="w-full py-3.5 bg-brand text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Save Note</button>
        </div>
    </div>

    <div id="imagePreviewModal" class="fixed inset-0 bg-black z-[70] hidden flex flex-col items-center justify-center transition-opacity opacity-0 duration-300">
        <div class="absolute top-0 inset-x-0 p-4 flex items-center justify-between bg-gradient-to-b from-black/80 to-transparent z-50">
            <button onclick="history.back()" class="p-2 rounded-full bg-white/10 text-white active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <button id="preview-delete-btn" class="p-2 rounded-full bg-red-600 text-white shadow-lg active:scale-90 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
        <div class="w-full h-full flex items-center justify-center p-4">
            <img id="full-preview-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="max-w-full max-h-full object-contain rounded-lg" alt="Full Preview">
        </div>
    </div>

    <footer class="fixed bottom-0 w-full pb-4 pt-4 px-4 z-40 bg-master/90 backdrop-blur-md border-t border-line transition-colors">
        <div class="flex space-x-3 w-full max-w-md mx-auto">

            <button id="sms-share-btn" class="flex-1 bg-brand border-none py-3.5 rounded-full flex items-center justify-center active:scale-95 transition-transform shadow-sm">
                <svg class="w-5 h-5 text-white mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <span class="text-[15px] font-bold text-white tracking-wide">SMS</span>
            </button>

            <a id="wa-share-btn" href="#" target="_blank" class="flex-1 bg-status-green border-none py-3.5 rounded-full flex items-center justify-center active:scale-95 transition-transform shadow-sm">
                <svg class="w-5 h-5 text-white mr-2" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.012c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                </svg>
                <span class="text-[15px] font-bold text-white tracking-wide">WhatsApp</span>
            </a>

        </div>
    </footer>
    
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/ui.js"></script> 
    <script src="../assets/js/entry_details.js"></script>
</body>
</html>
