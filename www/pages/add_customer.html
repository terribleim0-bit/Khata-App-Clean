<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../assets/fonts/Inter.ttf') format('truetype');
            font-weight: 100 900; 
            font-display: swap;
        }
        
        ::-webkit-scrollbar { display: none; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }

        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        
        /* Smooth animations */
        .fade-transition {
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hidden-state {
            opacity: 0 !important;
            transform: translateY(10px) !important;
            pointer-events: none !important;
        }
    </style>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Customer</title>
    

    <link rel="stylesheet" href="../assets/css/theme.css?v=3">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
               extend: {
                  fontFamily: {
                     sans: ['Inter', 'sans-serif'], 
                  },
                  colors: {
                      master: 'var(--bg-master)',
                      card: 'var(--bg-card)',
                      primary: 'var(--text-primary)',
                      secondary: 'var(--text-secondary)',
                      brand: 'var(--brand-blue)',
                      green: 'var(--status-green)',
                      red: 'var(--status-red)',
                      line: 'var(--border-line)',
                      avatar: 'var(--bg-avatar)'
                  }
               }
            }
        };
    </script>
    <script src="../assets/js/theme.js"></script> 
</head>

<body class="bg-master text-primary flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300 relative antialiased">

    <header class="relative bg-master/70 backdrop-blur-xl border-b border-line shrink-0 z-50 h-14 overflow-hidden transition-colors">
        
        <div id="header-normal" class="absolute inset-0 flex items-center justify-between px-4 transition-opacity duration-300">
            <button id="btn-back" class="flex items-center gap-1 -ml-2 p-2 text-brand active:opacity-50 active:scale-[0.98] transition-all z-10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span class="text-[17px] font-medium">Back</span> 
            </button>

            <h1 class="absolute left-1/2 transform -translate-x-1/2 text-[17px] font-semibold tracking-wide">
                Add Customer
            </h1>

            <button id="btn-open-search" class="p-2 -mr-2 text-brand active:opacity-50 transition-opacity z-10">
                <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
        </div>

        <div id="header-search" class="absolute inset-0 flex items-center px-4 transition-opacity duration-300 opacity-0 pointer-events-none">
            <div class="flex-1 flex items-center bg-[#E9E9EA] dark:bg-[#1C1C1E] rounded-[10px] px-3 py-1.5 transition-colors">
                <svg class="w-[20px] h-[20px] text-gray-500 shrink-0 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="search-input" class="flex-1 min-w-0 bg-transparent outline-none text-[17px] font-normal text-primary placeholder-gray-500 p-0" placeholder="Search">
                
                <button id="btn-clear-search" class="hidden text-gray-400 dark:text-gray-500 active:opacity-50 ml-2 shrink-0 outline-none">
                    <svg class="w-[18px] h-[18px]" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            
            <button id="btn-cancel-search" class="ml-3 text-brand text-[17px] font-normal active:scale-[0.98] active:opacity-50 shrink-0 transition-all">
                Cancel
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto relative pt-6 px-4">
        
        <div id="view-contacts" class="fade-transition w-full h-full flex flex-col max-w-md mx-auto">
            <span class="text-[13px] font-medium text-secondary uppercase block mb-1.5 px-3">Phonebook Contacts</span>
            
            <div id="contacts-list-wrapper" class="flex-1 overflow-y-auto hidden flex-col pb-24 bg-card rounded-2xl shadow-sm">
                
                <div class="flex items-center pl-4 transition-colors cursor-pointer active:scale-[0.98] active:opacity-70 transition-all">
                    <div class="w-10 h-10 rounded-full bg-avatar text-white flex items-center justify-center font-semibold text-[17px] shrink-0 uppercase">A</div>
                    <div class="flex-1 flex flex-col justify-center ml-3">
                        <div class="py-3 pr-4">
                            <p class="text-[16px] font-normal text-primary">Aman Galoti</p>
                            <p class="text-[13px] text-secondary mt-0.5">+918759100042</p>
                        </div>
                        <div class="h-[1px] bg-line mr-4"></div>
                    </div>
                </div>

                <div class="flex items-center pl-4 transition-colors cursor-pointer active:scale-[0.98] active:opacity-70 transition-all">
                    <div class="w-10 h-10 rounded-full bg-avatar text-white flex items-center justify-center font-semibold text-[17px] shrink-0 uppercase">B</div>
                    <div class="flex-1 flex flex-col justify-center ml-3">
                        <div class="py-3 pr-4">
                            <p class="text-[16px] font-normal text-primary">Baba Datewal</p>
                            <p class="text-[13px] text-secondary mt-0.5">+919646230342</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="search-empty-state" class="hidden flex-col items-center justify-center mt-16 px-4 pb-20 w-full z-10">
                <p class="text-secondary text-[15px] mb-5 font-medium">No Results Found</p>
                <button id="btn-smart-add" class="flex items-center gap-2 bg-brand/10 dark:bg-brand/15 text-brand px-6 py-3 rounded-[14px] active:opacity-50 transition-opacity">
                    <svg class="w-[20px] h-[20px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span id="smart-add-text" class="text-[17px] font-semibold">Add Manually</span>
                </button>
            </div>
        </div>

        <div id="view-manual" class="fade-transition hidden-state hidden w-full max-w-md mx-auto">
            
            <span class="text-[13px] font-medium text-secondary uppercase block mb-1.5 px-3">Customer Details</span>

            <div class="bg-card rounded-2xl overflow-hidden shadow-sm transition-colors mb-4">
                <div class="flex items-center p-4">
                    <svg class="w-[22px] h-[22px] text-secondary shrink-0 mr-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <input type="text" id="cust-name" class="w-full bg-transparent outline-none text-[16px] font-normal text-primary placeholder-secondary p-0" placeholder="Customer Name">
                </div>
            </div>

            <div id="phone-input-wrapper" class="overflow-hidden transition-all duration-400 ease-out max-h-0 opacity-0 scale-95 origin-top">
                <div class="bg-card rounded-2xl overflow-hidden shadow-sm transition-colors mb-2">
                    <div class="flex items-center p-4">
                        <svg class="w-[22px] h-[22px] text-secondary shrink-0 mr-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                        </svg>
                        <input type="tel" id="cust-phone" class="w-full bg-transparent outline-none text-[16px] font-normal text-primary placeholder-secondary p-0" placeholder="Phone Number (Optional)">
                    </div>
                </div>
                
                <div id="container-focus-contact-btn" class="flex justify-end px-3 mb-4">
                    <button id="btn-manual-pick-contact" class="flex items-center gap-1.5 text-brand text-[15px] font-medium active:opacity-50 transition-opacity">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <span>Add From Contacts</span>
                    </button>
                </div>
            </div>
            
        </div>

    </main>

    <div id="fab-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-30 transition-transform duration-300">
        <button id="btn-floating-manual" class="flex items-center gap-2 px-6 py-3.5 bg-[#007AFF] dark:bg-[#0A84FF] text-white rounded-full font-semibold text-[15px] shadow-lg active:opacity-70 active:scale-[0.98] transition-all whitespace-nowrap tracking-wide">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            Add Manually
        </button>
    </div>

    <div id="bottom-bar" class="fixed bottom-0 w-full p-4 bg-master/90 backdrop-blur-md z-20 pb-safe fade-transition hidden-state hidden">
        <div class="max-w-md mx-auto">
            <button id="confirm-btn" disabled class="w-full bg-brand text-white font-semibold text-[17px] py-[14px] rounded-[14px] active:opacity-70 active:scale-[0.98] disabled:opacity-50 transition-all shadow-sm">
                Confirm & Save Profile
            </button>
        </div>
    </div>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/add_customer.js"></script>
    <script src="../cordova.js"></script> 
</body>
</html>
