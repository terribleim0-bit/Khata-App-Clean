<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delete Transaction</title>
    <style> 
        @font-face {
            font-family: 'Inter';
            src: url('assets/fonts/Inter.ttf') format('truetype'); 
            font-weight: 100 900; 
            font-display: swap;
        }
    </style>
    <link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body class="bg-master text-primary flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300">

    <header class="flex-none p-4 flex items-center border-b border-line bg-master transition-colors">
        <button onclick="history.back()" class="text-primary active:scale-95 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
        </button>
        <h1 class="ml-4 text-xl font-bold">Delete Entry</h1>
    </header>

    <main class="flex-1 overflow-y-auto px-5 pt-8 pb-10 flex flex-col items-center">
        
        <div class="w-full max-w-md bg-card rounded-3xl p-5 border border-line shadow-sm mb-6 transition-colors">
            
            <div class="flex items-center justify-between gap-3">
                
                <div id="type-icon" class="shrink-0 flex items-center justify-center">
                    </div> 
                
                <div class="flex-1">
                    <div id="type-text" class="text-[16px] font-semibold text-primary tracking-tight"></div>
                    <div id="txn-date" class="text-[13px] font-medium text-muted mt-0.5">Loading...</div>
                </div>

                <div id="txn-amount" class="text-3xl font-bold tracking-tight shrink-0">
                    ₹0
                </div>

            </div>
            
            <div id="txn-note-container" class="hidden">
                <div class="ml-[48px] border-t border-line my-3.5"></div> <div class="flex items-start gap-3">
                    <div class="w-9 shrink-0 flex justify-end">
                        <svg class="w-4 h-4 text-muted mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>
                    </div>
                    <p id="txn-note" class="text-[14px] text-primary font-medium break-words"></p>
                </div>
            </div>

        </div>

        <button id="confirm-del-btn" class="w-full max-w-md bg-transparent border-2 border-status-red text-status-red font-bold text-[17px] py-3.5 rounded-full active:bg-status-red/10 active:scale-95 transition-all flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            Delete Entry
        </button>

    </main>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/delete_warning.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
