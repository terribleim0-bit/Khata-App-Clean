<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khata App - Amount Entry</title>
    

    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="../assets/js/theme.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        
        :root {
            --key-num-bg: #f2f8f8; --key-num-text: #111827;
            --key-op-bg: #e7f4ea; --key-op-text: #166534;
            --key-eq-bg: #c2e4c9; --key-eq-text: #14532d;
            --key-bs-bg: #ffebed; --key-bs-text: #ef4444;
            --cursor-color: #111827; --icon-color: #445b5b;
        }
        
        .dark {
            --key-num-bg: #1c1c1e; --key-num-text: #f3f4f6;
            --key-op-bg: #143120; --key-op-text: #4ade80; 
            --key-eq-bg: #166534; --key-eq-text: #86efac;
            --key-bs-bg: #451a1a; --key-bs-text: #f87171;
            --cursor-color: #ffffff; --icon-color: #9ca3af;
        }

        body { 
            -webkit-tap-highlight-color: transparent; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .key-btn { border-radius: 12px; font-size: 24px; font-weight: 600; display: flex; align-items: center; justify-content: center; height: 58px; transition: all 0.1s ease; }
        .key-btn:active { transform: scale(0.92); opacity: 0.8; }
        
        .key-num { background-color: var(--key-num-bg); color: var(--key-num-text); }
        .key-op { background-color: var(--key-op-bg); color: var(--key-op-text); }
        .key-eq { background-color: var(--key-eq-bg); color: var(--key-eq-text); }
        .key-backspace { background-color: var(--key-bs-bg); color: var(--key-bs-text); }
        
        .cursor { display: inline-block; width: 2px; height: 44px; background-color: var(--cursor-color); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        input[type="date"]::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    </style>
<link rel="stylesheet" href="./assets/css/theme.css">
</head>
<body class="font-sans h-[100dvh] w-full flex flex-col relative overflow-hidden bg-[#f4f7f6] dark:bg-[#0a0a0a] transition-colors duration-200">

    <header class="bg-white dark:bg-[#121212] px-4 py-3 flex items-center gap-4 border-b border-gray-200 dark:border-[#2a2a2e] shrink-0 z-10">
        <button id="back-btn" class="active:opacity-50 transition-opacity p-1 -ml-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3.5" stroke="currentColor" class="w-[22px] h-[22px] text-[#007AFF] dark:text-[#0A84FF]">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </button>
        <div class="flex flex-col flex-1 min-w-0">
            <h1 id="header-name" class="text-base font-bold text-gray-900 dark:text-gray-100 truncate">Loading...</h1>
            <p id="header-balance" class="text-xs font-semibold tracking-wide text-gray-500 dark:text-gray-400 truncate">₹0 Balance</p>
        </div>
        <div id="entry-type-badge" class="ml-auto text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md border shrink-0"></div>
    </header>

    <main class="flex-1 overflow-y-auto px-5 py-6 flex flex-col items-center justify-center">
        <div class="w-full text-center mb-6">
            <div id="amount-container" class="text-5xl font-bold flex justify-center items-center transition-colors">
                <span>₹</span><span id="amount-display">0</span><span class="cursor"></span>
            </div>
            <div id="amount-underline" class="h-[3px] w-32 mx-auto mt-4 rounded-full opacity-40 transition-colors"></div>
        </div>
    </main>

    <div id="action-container" class="hidden px-3 mb-4 flex flex-col gap-2 shrink-0 transition-all duration-300">
        <div id="open-note-btn" class="cursor-pointer min-h-[56px] px-3.5 py-2 bg-white dark:bg-[#1c1c1e] rounded-xl border border-gray-200 dark:border-[#2a2a2e] flex items-center justify-between active:scale-[0.98] transition-transform">
            <div class="flex items-center gap-3 flex-1">
                <svg style="color: var(--icon-color);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
                <span id="note-display" class="text-sm font-semibold text-gray-500 dark:text-gray-400 w-full truncate">Add Notes</span>
                <input id="note-input" type="hidden" value="">
            </div>
            <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
        </div>

        <div class="relative min-h-[56px] px-3.5 py-2 bg-white dark:bg-[#1c1c1e] rounded-xl border border-gray-200 dark:border-[#2a2a2e] flex items-center justify-between active:scale-[0.98] transition-transform overflow-hidden">
            <div class="flex items-center gap-3 flex-1">
                <svg style="color: var(--icon-color);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
                <div class="flex flex-col justify-center leading-tight mt-0.5">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Bill Date</span>
                    <span id="date-display" class="text-sm font-semibold text-gray-900 dark:text-gray-100">Today</span>
                </div>
            </div>
            <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            <input type="date" id="native-date-input" class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer">
        </div>

        <div id="bills-card-wrapper" class="bg-white dark:bg-[#1c1c1e] rounded-xl border border-gray-200 dark:border-[#2a2a2e] transition-all duration-300 overflow-hidden shrink-0">
            <div id="empty-bill-state" class="cursor-pointer min-h-[56px] px-3.5 py-2 flex items-center justify-between active:scale-[0.98] transition-transform" onclick="triggerBillModal()">
                <div class="flex items-center gap-3 flex-1">
                    <svg style="color: var(--icon-color);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" /></svg>
                    <span class="text-sm font-semibold text-gray-500 dark:text-gray-400 flex-1">Add Bills</span>
                </div>
                <svg class="w-5 h-5 text-[#007AFF] dark:text-[#0A84FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>

            <div id="filled-bill-state" class="hidden flex-col gap-3 p-3.5">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Bills</span>
                    <span id="bill-counter" class="text-[10px] font-bold text-gray-400">1/5</span>
                </div>
                <div class="flex items-center gap-3 overflow-x-auto pb-1 scrollbar-hide pt-1 pl-1" id="bill-gallery">
                </div>
            </div>
        </div>

        <button id="confirm-btn" class="mt-1 w-full text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 text-[16px] tracking-wide transition-all active:scale-95 disabled:opacity-70 disabled:active:scale-100">
            <svg id="confirm-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
            <span id="confirm-text">Confirm</span>
        </button>
    </div>

    <div id="keypad" class="grid grid-cols-4 gap-2 px-3 pb-safe bg-white dark:bg-[#121212] pt-3 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_15px_rgba(0,0,0,0.2)] z-10">
        <button class="key-btn key-num" data-val="7">7</button><button class="key-btn key-num" data-val="8">8</button><button class="key-btn key-num" data-val="9">9</button><button class="key-btn key-backspace" data-val="back">⌫</button>
        <button class="key-btn key-num" data-val="4">4</button><button class="key-btn key-num" data-val="5">5</button><button class="key-btn key-num" data-val="6">6</button><button class="key-btn key-op" data-val="*">×</button>
        <button class="key-btn key-num" data-val="1">1</button><button class="key-btn key-num" data-val="2">2</button><button class="key-btn key-num" data-val="3">3</button><button class="key-btn key-op" data-val="-">−</button>
        <button class="key-btn key-num" data-val=".">.</button><button class="key-btn key-num" data-val="0">0</button><button class="key-btn key-eq" data-val="=">=</button><button class="key-btn key-op" data-val="+">+</button>
    </div>

    <div id="noteModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-overlay"></div>
        <div class="modal-content relative w-full max-w-md bg-white dark:bg-[#1c1c1e] rounded-t-[28px] p-6 pb-10 transform translate-y-full transition-transform duration-300 shadow-2xl will-change-transform">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mb-6"></div>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100">Add Note</h3>
                <span class="text-[11px] font-medium text-gray-400">Max 150 chars</span>
            </div>
            <div class="bg-gray-50 dark:bg-[#121212] p-2 rounded-xl border border-gray-200 dark:border-[#2a2a2e] mb-6">
                <input type="text" id="quick-note-input" maxlength="150" placeholder="Enter notes..." class="w-full bg-transparent text-base text-gray-900 dark:text-gray-100 outline-none font-medium p-2">
            </div>
            <button id="save-note-btn" class="w-full py-3.5 bg-[#007AFF] dark:bg-[#0A84FF] text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform">Done</button>
        </div>
    </div>

    <div id="billModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-overlay"></div>
        <div class="modal-content relative w-full max-w-md bg-white dark:bg-[#1c1c1e] rounded-t-[28px] p-6 pb-10 transform translate-y-full transition-transform duration-300 shadow-2xl will-change-transform">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100 mb-4 text-center">Attach Bill</h3>
            <div class="flex flex-col gap-3 mb-2">
                <button id="cam-capture-btn" class="w-full py-4 bg-gray-100 dark:bg-[#2a2a2e] text-gray-900 dark:text-gray-100 font-bold rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                    <svg class="w-6 h-6 text-[#007AFF] dark:text-[#0A84FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Take Photo
                </button>
                <button id="cam-gallery-btn" class="w-full py-4 bg-gray-100 dark:bg-[#2a2a2e] text-gray-900 dark:text-gray-100 font-bold rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                    <svg class="w-6 h-6 text-[#007AFF] dark:text-[#0A84FF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Choose from Gallery
                </button>
                <input type="file" id="native-gallery-input" multiple accept="image/*" class="hidden">
            </div>
        </div>
    </div>

    <div id="imagePreviewModal" class="fixed inset-0 z-[80] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="toggleModal('imagePreviewModal', false)"></div>
        <div class="relative w-full max-w-lg p-4 flex flex-col items-center justify-center h-full">
            <button onclick="toggleModal('imagePreviewModal', false)" class="absolute top-6 right-6 bg-white/10 p-2.5 rounded-full text-white hover:bg-white/20 active:scale-90 transition-all z-10 backdrop-blur-md border border-white/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="preview-img-container" class="relative w-full h-full max-h-[80vh] flex items-center justify-center transform scale-95 transition-transform duration-300 will-change-transform">
                <span id="preview-loader" class="absolute text-white font-medium text-sm tracking-widest uppercase">Loading...</span>
                <img id="full-preview-img" src="" class="max-w-full max-h-full rounded-lg object-contain shadow-2xl opacity-0 transition-opacity duration-300 z-10">
            </div>
        </div>
    </div>

    <script src="../assets/js/db.js"></script>
    <script src="../cordova.js"></script>
    <script src="../assets/js/ui.js"></script> 
    <script src="../assets/js/add_entry.js"></script>
</body>
</html>
