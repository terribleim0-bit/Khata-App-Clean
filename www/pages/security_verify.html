<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../assets/fonts/Inter.ttf') format('truetype');
            font-weight: 100 900; /* Variable font hon karke 100 ton 900 tak saare weight kam karange */
            font-display: swap;
        }
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } 100% { transform: translateX(0); } }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Verify - Khata App</title>
    

    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
               extend: {
                  fontFamily: {
                     // Eh saari app da default font 'Inter' kar dawega
                     sans: ['Inter', 'sans-serif'], 
                  }
               }
            }
        };
    </script>
    <script src="../assets/js/theme.js"></script>

    
<link rel="stylesheet" href="./assets/css/theme.css">
<link rel="stylesheet" href="../assets/css/theme.css">
</head>

<body class="bg-[#f2f2f7] dark:bg-[#000000] text-gray-900 dark:text-gray-100 flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300 relative">

    <header class="sticky top-0 w-full h-14 px-4 flex items-center justify-between border-b border-gray-200/80 dark:border-[#38383A]/80 bg-white/70 dark:bg-black/70 backdrop-blur-xl transition-colors z-50">
        <button id="back-btn" onclick="window.goBack()" class="flex items-center gap-1 -ml-2 p-2 text-[#007AFF] dark:text-[#0A84FF] active:opacity-50 transition-opacity">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-[17px] font-medium">Back</span> 
        </button>
        <h1 class="absolute left-1/2 transform -translate-x-1/2 text-[17px] font-semibold text-gray-900 dark:text-white tracking-wide">
            Security Verify
        </h1>
    </header>

    <main class="h-full w-full flex flex-col items-center px-6 absolute top-0 left-0 z-10 pt-[120px]" onclick="document.getElementById('hidden-pin').focus()">
        
        <!-- Wadda Apple Blue Icon -->
        <div id="main-icon" class="mb-6 flex items-center justify-center">
            <svg class="w-16 h-16 text-[#007AFF] dark:text-[#0A84FF]" viewBox="0 0 24 24">
                <path d="M 7 16.5 L 7 18 A 2 2 0 0 0 9 20 L 15 20 A 2 2 0 0 0 17 18 L 17 6 A 2 2 0 0 0 15 4 L 9 4 A 2 2 0 0 0 7 6 L 7 7" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                <path d="M 11 17.5 H 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                <rect x="3.5" y="11" width="6.5" height="4.5" rx="1.2" fill="currentColor" />
                <path d="M 5.25 11 V 9 A 1.5 1.5 0 0 1 8.25 9 V 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
            </svg>
        </div>

        <!-- Title Text (Khaali chadeya hai, JS sirf Change PIN vele bharega) -->
        <h2 id="verify-title" class="text-[17px] font-normal text-gray-900 dark:text-white tracking-wide mb-8 text-center empty:hidden"></h2>

        <!-- Balanced PIN Dots (Hamesha disange) -->
        <div id="pin-dots" class="flex items-center justify-center space-x-4 h-10 mb-2 w-full">
            <div class="dot w-3 h-3 rounded-full bg-[#E9E9EA] dark:bg-[#39393D] transition-colors"></div>
            <div class="dot w-3 h-3 rounded-full bg-[#E9E9EA] dark:bg-[#39393D] transition-colors"></div>
            <div class="dot w-3 h-3 rounded-full bg-[#E9E9EA] dark:bg-[#39393D] transition-colors"></div>
            <div class="dot w-3 h-3 rounded-full bg-[#E9E9EA] dark:bg-[#39393D] transition-colors"></div>
        </div>

        <!-- 🟢 Nava Biometric Pill Button -->
        <div id="bio-pill-container" class="hidden w-full justify-center mt-6">
            <button onclick="window.startBiometric(event)" class="flex items-center space-x-2 text-[#007AFF] dark:text-[#0A84FF] active:opacity-50 transition-opacity p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
                </svg>
                <span class="font-semibold text-[13px] tracking-wide">Use Fingerprint</span>
            </button>
        </div>

        <p id="error-msg" class="hidden text-[#ef4444] text-sm font-bold mt-4 transition-opacity">Incorrect PIN!</p>
    </main>

    <input type="tel" id="hidden-pin" class="absolute top-0 left-0 w-0 h-0 opacity-0 z-[-1]" maxlength="4" autocomplete="off" autofocus>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/security_verify.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
