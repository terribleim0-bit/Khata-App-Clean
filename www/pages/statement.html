<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Statement - Khata App</title>
    

    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="../assets/js/theme.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f2f2f7] dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 flex flex-col h-[100dvh] overflow-hidden font-sans transition-colors duration-300">

    <header class="flex-none p-4 flex items-center border-b border-gray-300 dark:border-[#2a2a2e] bg-white dark:bg-[#121212] z-40 transition-colors">
        <button onclick="window.history.back()" class="text-gray-500 dark:text-gray-400 active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="ml-4 text-[17px] font-bold">Statement Report</h1>
    </header>

    <div class="w-full overflow-x-auto hide-scroll py-5 px-4 shrink-0 flex gap-2 transition-colors">
        <button onclick="setFilter('10')" id="filter-10" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 shrink-0 transition-colors">Last 10</button>
        <button onclick="setFilter('1M')" id="filter-1M" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-gray-300 dark:border-gray-700 text-gray-500 dark:text-gray-400 shrink-0 transition-colors">1 Month</button>
        <button onclick="setFilter('3M')" id="filter-3M" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-gray-300 dark:border-gray-700 text-gray-500 dark:text-gray-400 shrink-0 transition-colors">3 Months</button>
        <button onclick="setFilter('6M')" id="filter-6M" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-gray-300 dark:border-gray-700 text-gray-500 dark:text-gray-400 shrink-0 transition-colors">6 Months</button>
        <button onclick="setFilter('1Y')" id="filter-1Y" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-gray-300 dark:border-gray-700 text-gray-500 dark:text-gray-400 shrink-0 transition-colors">1 Year</button>
        <button onclick="openCustomDate()" id="filter-Custom" class="filter-btn px-4 py-1.5 rounded-full text-[13px] font-bold border border-gray-300 dark:border-gray-700 text-gray-500 dark:text-gray-400 shrink-0 flex items-center gap-1 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> Custom
        </button>
    </div>

    <main class="flex-1 overflow-y-auto px-4 pb-[120px] bg-[#f2f2f7] dark:bg-[#0a0a0a] transition-colors relative">
        
        <div id="receipt-box" class="max-w-md mx-auto bg-white dark:bg-[#18181b] rounded-3xl p-5 border border-gray-300 dark:border-[#2a2a2e] shadow-sm dark:shadow-lg relative transition-colors">
            
            <div class="text-center mb-4 flex flex-col items-center">
        
                <h2 id="cust-name" class="text-[22px] font-bold text-gray-900 dark:text-white mb-1">Loading...</h2>
                
                <div class="inline-flex items-center gap-1.5 px-3 py-1">
                    <svg class="w-3.5 h-3.5 text-blue-500 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p id="date-range-text" class="text-[11px] font-bold text-blue-600 dark:text-blue-400 tracking-wide">
                        Calculating...
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-[3.5rem_1fr_auto] gap-2 text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest pb-2 border-b border-gray-200 dark:border-[#2a2a2e]">
                <span>Date</span>
                <span>Note</span>
                <span class="text-right">Amount</span>
            </div>

            <div id="txn-list" class="flex flex-col">
                </div>

            <div class="flex justify-between items-center pt-3 mt-1">
                <div class="flex items-center text-[15px] font-bold text-gray-700 dark:text-gray-300">
                    <svg class="w-5 h-5 mr-2 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                    <span id="net-balance-label">Balance</span>
                </div>
                <p id="net-balance-value" class="text-[22px] font-bold tracking-tight text-gray-500 dark:text-gray-400">₹ 0</p>
            </div>

           
            
        </div>
    </main>

    <footer class="fixed bottom-0 w-full pb-6 pt-8 px-4 z-40 bg-gradient-to-t from-[#f2f2f7] dark:from-[#000000] via-[#f2f2f7]/80 dark:via-[#000000]/80 to-transparent pointer-events-none">
        <div class="flex space-x-3 w-full max-w-md mx-auto pointer-events-auto">
            
            <button id="btn-download-html" class="flex-1 bg-[#3b82f6] border-none shadow-sm py-3 rounded-[14px] flex items-center justify-center active:scale-95 transition-transform">
                <svg class="w-5 h-5 text-white mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span class="text-[15px] font-bold text-white">HTML</span>
            </button>

            <button id="btn-share-pdf" class="flex-[1.2] bg-[#16a34a] border-none shadow-sm py-3 rounded-[14px] flex items-center justify-center active:scale-95 transition-transform">
                <svg class="w-5 h-5 text-white mr-1.5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.012c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                <span id="share-text" class="text-[15px] font-bold text-white">Share PDF</span>
            </button>
        </div>
    </footer>

    <div id="dateModal" class="fixed inset-0 z-[60] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeCustomDate()"></div>
        <div class="relative w-[90%] max-w-sm bg-[#1c1c1e] rounded-[24px] p-6 shadow-2xl border border-[#2a2a2e]">
            <h3 class="text-lg font-bold text-gray-100 mb-5">Select Date Range</h3>
            <div class="flex flex-col gap-4 mb-6">
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 block">Start Date</label>
                    <input type="date" id="start-date" class="w-full bg-[#121212] border border-[#2a2a2e] rounded-xl px-3 py-3 outline-none text-sm text-white [color-scheme:dark]">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 block">End Date</label>
                    <input type="date" id="end-date" class="w-full bg-[#121212] border border-[#2a2a2e] rounded-xl px-3 py-3 outline-none text-sm text-white [color-scheme:dark]">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeCustomDate()" class="flex-1 py-3.5 bg-[#2a2a2e] text-gray-300 font-bold rounded-xl active:scale-95 transition-transform">Cancel</button>
                <button onclick="applyCustomDate()" class="flex-1 py-3.5 bg-blue-600 text-white font-bold rounded-xl active:scale-95 transition-transform">Apply</button>
            </div>
        </div>
    </div>
    <div id="pdf-wrapper" style="position: absolute; left: -9999px; top: 0; width: 794px;">
        <div id="hidden-a4-template" style="background: white; color: black; font-family: sans-serif; padding: 40px; box-sizing: border-box; width: 794px; min-height: 1123px;">
            <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #e5e7eb; padding-bottom: 20px; margin-bottom: 20px;">
                <div>
                    <h1 id="a4-name" style="margin: 0; font-size: 32px; color: #111827; font-weight: bold;">Loading...</h1>
                    <p id="a4-phone" style="margin: 8px 0 0 0; color: #4b5563; font-size: 16px;">Mobile: ---</p>
                </div>
                <div style="text-align: right;">
                    <p style="margin: 0; color: #9ca3af; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Khata Statement</p>
                    <p id="a4-date" style="margin: 8px 0 0 0; font-weight: bold; color: #374151; font-size: 16px;">---</p>
                </div>
            </div>
            
            <div style="text-align: center; margin-bottom: 40px; background-color: #f9fafb; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb;">
                <h2 id="a4-balance" style="margin: 0; font-size: 36px; font-weight: bold;">₹ 0</h2>
                <p id="a4-bal-label" style="margin: 8px 0 0 0; color: #6b7280; font-size: 16px; font-weight: bold;">Net Balance</p>
            </div>

            <table style="width: 100%; border-collapse: collapse; font-size: 16px;">
                <thead>
                    <tr style="border-bottom: 2px solid #d1d5db; color: #4b5563;">
                        <th style="text-align: left; padding: 15px 10px; width: 20%;">Date</th>
                        <th style="text-align: left; padding: 15px 10px; width: 40%;">Note</th>
                        <th style="text-align: right; padding: 15px 10px; width: 20%; color: #16a34a;">Payment (+)</th>
                        <th style="text-align: right; padding: 15px 10px; width: 20%; color: #dc2626;">Credit (-)</th>
                    </tr>
                </thead>
                <tbody id="a4-tbody">
                    </tbody>
            </table>

            <div style="margin-top: 60px; border-top: 1px solid #e5e7eb; padding-top: 20px; text-align: center; color: #9ca3af; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">
                Securely Generated via Khata App
            </div>
        </div>
    </div>
 
    <script src="../assets/js/html2pdf.bundle.min.js"></script>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/statement.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
