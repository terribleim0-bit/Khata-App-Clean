<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Profile - Khata App</title>
    

    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <script src="../assets/js/theme.js"></script>

    <script>
        document.addEventListener('deviceready', function() {
            // Hardware Back Button fixed
            document.addEventListener('backbutton', function (e) {
                e.preventDefault();
                history.back(); 
            }, false);

            // Resume/Lock Check
            document.addEventListener('resume', function() {
                const isLockEnabled = localStorage.getItem('app_lock_enabled') === 'true';
                if (isLockEnabled) {
                    sessionStorage.removeItem('unlocked');
                    window.location.replace('lock.html');
                }
            }, false);
        }, false);
    </script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
<link rel="stylesheet" href="./assets/css/theme.css">
</head>
<body class="bg-[#f4f6f8] dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 flex flex-col h-[100dvh] overflow-hidden transition-colors duration-300">

    <header class="flex-none p-4 flex items-center border-b border-gray-200 dark:border-[#2a2a2e] bg-white dark:bg-[#121212] transition-colors">
        <button onclick="history.back()" class="text-gray-600 dark:text-gray-400 active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="ml-4 text-xl font-bold">Profile</h1>
    </header>

    <main class="flex-1 overflow-y-auto px-4 py-8 flex flex-col items-center">
        
        <div class="relative mb-8">
            <div id="prof-initial" class="w-28 h-28 rounded-full bg-blue-600 flex items-center justify-center text-white text-4xl font-bold shadow-lg border-4 border-white dark:border-[#1c1c1e]">?</div>
            <div class="absolute bottom-1 right-1 bg-green-500 p-2 rounded-full border-2 border-white dark:border-[#0a0a0a] text-white">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
            </div>
        </div>

        <div class="w-full space-y-4 max-w-md">
            
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[2px] px-2">Customer Information</p>

            <div onclick="openEditModal('name')" class="bg-white dark:bg-[#1c1c1e] p-4 rounded-2xl flex items-center justify-between border border-gray-200 dark:border-[#2a2a2e] active:bg-gray-50 dark:active:bg-[#252529] transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="p-2.5 bg-gray-50 dark:bg-[#121212] text-gray-400 rounded-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div>
                        <p id="display-name" class="font-bold text-[15px]">Loading...</p>
                        <p class="text-[11px] text-gray-400">Customer Name</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </div>

            <div onclick="openEditModal('phone')" class="bg-white dark:bg-[#1c1c1e] p-4 rounded-2xl flex items-center justify-between border border-gray-200 dark:border-[#2a2a2e] active:bg-gray-50 dark:active:bg-[#252529] transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="p-2.5 bg-gray-50 dark:bg-[#121212] text-gray-400 rounded-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <div>
                        <p id="display-phone" class="font-bold text-[15px]">Loading...</p>
                        <p class="text-[11px] text-gray-400">Mobile Number</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </div>

            <p class="text-[10px] font-bold text-red-500 uppercase tracking-[2px] px-2 pt-4">Danger Zone</p>

            <div id="delete-btn" class="bg-white dark:bg-[#1c1c1e] p-4 rounded-2xl flex items-center justify-between border border-red-100 dark:border-red-900/20 active:bg-red-50 dark:active:bg-red-900/10 transition-all cursor-pointer">
                <div class="flex items-center gap-4 text-red-500">
                    <div class="p-2.5 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </div>
                    <p class="font-bold text-[15px]">Delete Customer</p>
                </div>
            </div>

        </div>
    </main>

    <div id="editModal" class="fixed inset-0 z-[60] flex items-end justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div id="modalContent" class="relative w-full max-w-md bg-white dark:bg-[#1c1c1e] rounded-t-[32px] p-6 pb-10 transform translate-y-full transition-transform duration-300 border-t border-gray-200 dark:border-[#2a2a2e] shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mb-6"></div>
            
            <h3 id="modal-title" class="text-lg font-bold mb-4">Edit Detail</h3>
            
            <div class="relative mb-6">
                <label id="modal-label" class="absolute -top-2 left-3 bg-white dark:bg-[#1c1c1e] px-1 text-[10px] font-bold text-green-500 uppercase tracking-wide">Label</label>
                <input type="text" id="modal-input" class="w-full bg-transparent border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3.5 text-[15px] font-medium outline-none focus:border-green-500 transition-colors">
            </div>

            <button onclick="saveChanges()" class="w-full py-4 bg-[#22c55e] text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">Submit</button>
        </div>
    </div>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/profile.js"></script>
    <script src="../cordova.js"></script>
</body>
</html>
