<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khata App - Home</title>
    
    <!-- Link to Master Theme CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
    
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
               extend: {
                  fontFamily: {
                     sans: ['Inter', 'sans-serif'], 
                  },
                  colors: {
                      master: 'var(--bg-master)',
                      card: 'var(--bg-card)',
                      primary: 'var(--text-primary)',
                      secondary: 'var(--text-secondary)',
                      brand: 'var(--brand-blue)',
                      green: 'var(--status-green)',
                      red: 'var(--status-red)',
                      line: 'var(--border-line)',
                      avatar: 'var(--bg-avatar)'
                  }
               }
            }
        };
    </script>
    <script src="assets/js/theme.js"></script>

    <style> 
        @font-face {
            font-family: 'Inter';
            src: url('assets/fonts/Inter.ttf') format('truetype'); 
            font-weight: 100 900; 
            font-display: swap;
        }
        
        ::-webkit-scrollbar { display: none; }
        
        /* Touch Delay & Highlight Fixes */
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        } 
        
        .pb-safe { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        
        /* Floating Button Animations */
        #fab-container a { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #fab-container span { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; overflow: hidden; white-space: nowrap; }
        #fab-container.shrunk a { padding-left: 0.875rem !important; padding-right: 0.875rem !important; }
        #fab-container.shrunk span { max-width: 0 !important; margin-left: 0 !important; opacity: 0 !important; }
        
        /* Smooth Transitions for Search UI */
        .fade-transition {
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden-state {
            opacity: 0 !important;
            transform: translateY(-10px) !important;
            pointer-events: none !important;
            position: absolute; /* Prevents layout jump when hiding */
        }
        
        .app-locked { opacity: 0; pointer-events: none; }
    </style>
<link rel="stylesheet" href="./assets/css/theme.css">
<link rel="stylesheet" href="../assets/css/theme.css">
</head>

<body class="bg-master text-primary antialiased select-none h-[100dvh] overflow-hidden flex flex-col transition-colors duration-300 relative">

    <!-- Header Area -->
    <header class="relative flex-none h-14 bg-master/70 backdrop-blur-xl z-50 flex items-center justify-between px-4 border-b border-line overflow-hidden transition-colors">
        
        <!-- Normal Header -->
        <div id="header-normal" class="absolute inset-0 flex items-center justify-between px-4 transition-opacity duration-300">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 flex items-center justify-center text-brand">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" class="w-full h-full">
                        <circle cx="512" cy="512" r="320" fill="currentColor"/>
                        <g transform="translate(405 372) scale(0.40)">
                        <path fill="#FFFFFF" d="M45 0H520L480 82H338C360 105 374 132 385 164H545L505 246H384C368 356 291 416 161 420L448 722C458 732 453 741 440 741H318L20 430V330H122C222 330 291 297 323 246H0L40 164H274C246 120 194 82 110 82H5Z"/>
                        </g>
                    </svg>
                </div>
                <h1 class="text-[17px] font-semibold text-primary tracking-wide">Khata App</h1>
            </div>
            
            <button id="search-toggle-btn" class="p-2 -mr-2 text-brand active:scale-[0.98] active:opacity-50 transition-all z-10">
                <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </button>
        </div>

        <!-- Search Header -->
        <div id="header-search" class="absolute inset-0 flex items-center px-4 transition-opacity duration-300 opacity-0 pointer-events-none">
            <div class="flex-1 flex items-center bg-[#E9E9EA] dark:bg-[#1C1C1E] rounded-[10px] px-3 py-1.5 transition-colors">
                <svg class="w-[20px] h-[20px] text-gray-500 shrink-0 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="search-input" class="flex-1 min-w-0  bg-transparent outline-none text-[17px] font-normal text-primary placeholder-gray-500 p-0" placeholder="Search customers...">
                
                <button id="btn-clear-search" class="hidden text-gray-400 dark:text-gray-500 active:opacity-50 ml-2 shrink-0 outline-none">
                    <svg class="w-[18px] h-[18px]" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <button id="cancel-search-btn" class="ml-3 text-[17px] text-brand font-normal active:scale-[0.98] active:opacity-50 shrink-0 transition-all">
                Cancel
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 px-4 py-4 overflow-y-auto pb-24 relative" id="main-scroll-area">
        
        <!-- Net Balance Card -->
        <div id="net-balance-card" class="bg-card rounded-2xl px-5 py-4 flex justify-between items-start mb-4 shadow-sm transition-all duration-300 fade-transition relative z-10">
            <div>
                <h2 class="text-[17px] font-semibold text-primary tracking-wide">Net Balance</h2>
                <p id="account-count" class="text-[13px] text-secondary mt-0.5 tracking-wide">
                    0 Accounts
                </p>
            </div>
            <div class="text-right">
                <p id="total-balance" class="text-[17px] font-semibold text-primary leading-tight">₹0</p>
                <p id="total-status" class="text-[13px] text-secondary mt-0.5 tracking-wide">Settled</p>
            </div>
        </div>

        <!-- Customer List Container -->
        <div id="customer-list" class="fade-transition w-full pb-6 z-0 relative"></div>
        
    </main>

    <!-- Floating Action Button -->
    <div id="fab-container" class="fixed bottom-[80px] right-4 z-50 fade-transition">
        <a href="pages/add_customer.html" class="flex items-center bg-brand text-white px-5 py-3.5 rounded-full shadow-lg active:scale-[0.98] active:opacity-70 transition-all">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
            </svg>
            <span class="font-semibold text-[15px] ml-2 opacity-100 tracking-wide">Add Customer</span>
        </a>
    </div>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 w-full h-[60px] bg-master/90 backdrop-blur-md border-t border-line flex justify-around items-center z-40 transition-colors pb-safe">
        <a href="#" class="flex flex-col items-center p-2 text-brand active:scale-[0.98] active:opacity-70 transition-all">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span class="text-[11px] font-medium tracking-wide">Home</span>
        </a>
        <a href="pages/settings.html" class="flex flex-col items-center p-2 text-secondary hover:text-brand active:scale-[0.98] active:opacity-70 transition-all">
            <svg class="w-6 h-6 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
            <span class="text-[11px] font-medium tracking-wide">Settings</span>
        </a>
    </nav>

    <script src="assets/js/db.js"></script>
    <script src="cordova.js"></script>
    <script src="assets/js/ui.js"></script> 
    <script src="assets/js/home.js"></script>
</body>
</html>
